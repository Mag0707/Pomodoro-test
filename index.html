<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="過緊張タイマー">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>過緊張チェックタイマー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <p class="eyebrow">TENSION CHECK TIMER</p>
      <h1>過緊張チェックタイマー</h1>
      <p class="subtitle">集中しすぎていないか、定期的に確認するためのタイマーです。</p>
    </header>

    <section id="setup-screen" class="screen" aria-labelledby="setup-title">
      <div class="card">
        <h2 id="setup-title">タイマー設定</h2>

        <label class="field-label" for="focus-minutes">集中時間</label>
        <div class="minute-control">
          <button id="decrease-button" class="step-button" type="button" aria-label="集中時間を1分減らす">−</button>
          <div class="minute-display">
            <input
              id="focus-minutes"
              type="number"
              min="1"
              max="120"
              step="1"
              value="25"
              inputmode="numeric"
              aria-describedby="minute-help"
            >
            <span>分</span>
          </div>
          <button id="increase-button" class="step-button" type="button" aria-label="集中時間を1分増やす">＋</button>
        </div>
        <p id="minute-help" class="help-text">1〜120分で指定できます。休憩は5分固定です。</p>

        <div class="setting-group">
          <label class="field-label" for="alert-sound">集中終了のアラート音</label>
          <div class="sound-row">
            <select id="alert-sound">
              <option value="soft-chime">やわらかいチャイム</option>
              <option value="bell">ベル</option>
              <option value="digital">電子音</option>
            </select>
            <button id="preview-alert-button" class="preview-button" type="button">試聴</button>
          </div>
          <p class="help-text compact">集中終了時に約2秒だけ鳴ります。</p>
        </div>

        <div class="setting-group">
          <label class="field-label" for="focus-sound">集中中の音</label>
          <div class="sound-row">
            <select id="focus-sound">
              <option value="none">無音</option>
              <option value="soft-tick">小さな時計音</option>
              <option value="soft-breeze">やわらかな風音</option>
              <option value="gentle-rain">やさしい雨音</option>
            </select>
            <button id="preview-focus-button" class="preview-button" type="button">試聴</button>
          </div>
          <p class="help-text compact">休憩中と一時停止中は必ず無音になります。</p>
        </div>

        <button id="start-button" class="primary-button" type="button">スタート</button>
      </div>
    </section>

    <section id="timer-screen" class="screen hidden" aria-labelledby="phase-label">
      <div id="timer-card" class="timer-card">
        <div id="timer-content" class="timer-content shift-0">
          <p id="phase-label" class="phase-label">集中時間</p>
          <p id="time-display" class="time-display" aria-live="polite">25:00</p>
          <p id="check-message" class="check-message">肩と顎の力を確認しましょう。</p>
          <p id="cycle-display" class="cycle-display">1セット目</p>
          <p id="wake-lock-status" class="wake-lock-status">画面消灯防止：未使用</p>
        </div>
        <p id="restore-notice" class="restore-notice hidden" role="status">
          前回のタイマーを復元しました。スタートを押すと再開します。
        </p>

        <div id="running-controls" class="button-stack">
          <button id="pause-button" class="primary-button" type="button">一時停止</button>
        </div>

        <div id="paused-controls" class="button-stack hidden">
          <button id="resume-button" class="primary-button" type="button">スタート</button>
          <button id="reset-button" class="secondary-button" type="button">リセット</button>
        </div>

        <div id="alert-controls" class="alert-note hidden" role="status">
          まもなく休憩を開始します
        </div>

        <p id="dim-mode-hint" class="dim-mode-hint hidden">
          画面をタップすると通常表示に戻ります
        </p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
